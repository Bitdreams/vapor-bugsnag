name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (strict concurrency)
    runs-on: ubuntu-latest
    container: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Build (including tests, strict concurrency)
        run: swift build --build-tests -Xswiftc -strict-concurrency=complete
      - name: Test
        run: swift test
